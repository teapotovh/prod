apiVersion: apps/v1
kind: Deployment
metadata:
  name: deplyoment
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 0
      maxUnavailable: 1
  template:
    metadata:
      # annotations:
      #   prometheus.io/scrape: "true"
      #   prometheus.io/port: "8146"
    spec:
      tolerations:
      - key: node-role.kubernetes.io/control-plane
        operator: Exists
        effect: NoSchedule
      nodeSelector:
        node-role.kubernetes.io/control-plane: ""
      containers:
        - name: loadbalancerd
          image: ghcr.io/teapotovh/loadbalancerd:v0.0.18
          ports:
            - name: observability
              protocol: TCP
              containerPort: 8146
          args:
            - --log-format=json
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 256Mi
