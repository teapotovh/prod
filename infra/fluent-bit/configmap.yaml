apiVersion: v1
kind: ConfigMap
metadata:
  name: config
data:
  # custom_parsers.conf: |
  #   [PARSER]
  #       Name docker_no_time
  #       Format json
  #       Time_Keep Off
  #       Time_Key time
  #       Time_Format %Y-%m-%dT%H:%M:%S.%L
  #
  # fluent-bit.conf: |
  #   [SERVICE]
  #       Daemon Off
  #       Flush 1
  #       Log_Level info
  #       Parsers_File /fluent-bit/etc/parsers.conf
  #       Parsers_File /fluent-bit/etc/conf/custom_parsers.conf
  #
  #   [INPUT]
  #       Name tail
  #       Path /var/log/containers/*.log
  #       multiline.parser docker, cri
  #       Tag kube.*
  #       Mem_Buf_Limit 5MB
  #       Skip_Long_Lines On
  #
  #   [INPUT]
  #       Name systemd
  #       Tag host.*
  #       Systemd_Filter _SYSTEMD_UNIT=kubelet.service
  #       Read_From_Tail On
  #
  #   [FILTER]
  #       Name kubernetes
  #       Match kube.*
  #       Merge_Log On
  #       Keep_Log Off
  #       K8S-Logging.Parser On
  #       K8S-Logging.Exclude On
  #
  #   [OUTPUT]
  #       Name es
  #       Match kube.*
  #       Host elasticsearch-master
  #       Logstash_Format On
  #       Retry_Limit False
  #
  #   [OUTPUT]
  #       Name es
  #       Match host.*
  #       Host elasticsearch-master
  #       Logstash_Format On
  #       Logstash_Prefix node
  #       Retry_Limit False
  fluent-bit.conf: |
    [SERVICE]
        Flush         5
        Daemon        Off
        Log_Level     info
        Parsers_File  parsers.conf
        HTTP_Server   On
        HTTP_Listen   0.0.0.0
        HTTP_Port     2020
        Health_Check  On
 
    # Kubernetes pod logs
    [INPUT]
        Name              tail
        Tag               kube.*
        Path              /var/log/containers/*.log
        multiline.parser  docker, cri
        DB                /var/log/flb_kube.db
        Mem_Buf_Limit     10MB
        Skip_Long_Lines   On
        Refresh_Interval  10
 
    # systemd / journald (kubelet, containerd, etc.)
    [INPUT]
        Name            systemd
        Tag             systemd.*
        Systemd_Filter  _SYSTEMD_UNIT=kubelet.service
        Systemd_Filter  _SYSTEMD_UNIT=containerd.service
        DB              /var/log/flb_systemd.db
        Read_From_Tail  On
 
    # dmesg — kernel ring buffer via journald transport
    [INPUT]
        Name            systemd
        Tag             dmesg.*
        Systemd_Filter  _TRANSPORT=kernel
        DB              /var/log/flb_dmesg.db
        Read_From_Tail  On
 
    # Enrich pod logs with Kubernetes metadata (namespace, pod, image, labels…)
    [FILTER]
        Name                kubernetes
        Match               kube.*
        Kube_URL            https://kubernetes.default.svc:443
        Kube_CA_File        /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
        Kube_Token_File     /var/run/secrets/kubernetes.io/serviceaccount/token
        Kube_Tag_Prefix     kube.var.log.containers.
        Merge_Log           On       # unpack JSON log lines into the record
        Merge_Log_Key       log_parsed
        Keep_Log            Off      # drop the raw "log" string after merging
        Annotations         Off      # skip annotations (usually noisy)
        Labels              On
 
    # Lift kubernetes.* sub-fields to the top level for easier lnav querying
    # [FILTER]
    #     Name    nest
    #     Match   kube.*
    #     Operation lift
    #     Nested_under kubernetes
    #     Add_prefix k8s_
 
    [OUTPUT]
        Name              http
        Match             *
        Host              logd.storage
        Port              8145
        URI               /logs
        Format            json
        json_date_key     timestamp
        json_date_format  iso8601
        Retry_Limit       5
 
  parsers.conf: |
    # Standard Docker / CRI parsers are built-in; define extras here if needed.
    [PARSER]
        Name        json
        Format      json
        Time_Key    time
        Time_Format %Y-%m-%dT%H:%M:%S.%LZ
