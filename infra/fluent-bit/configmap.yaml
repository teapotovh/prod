apiVersion: v1
kind: ConfigMap
metadata:
  name: config
data:
  fluent-bit.conf: |
    [SERVICE]
        Flush        5
        Daemon       Off
        Log_Level    warn
        HTTP_Server   On
        HTTP_Listen   0.0.0.0
        HTTP_Port     2020
        Health_Check  On

    [INPUT]
        Name              tail
        Path              /var/log/containers/*.log
        Exclude_Path      /var/log/containers/fluent-bit-*,/var/log/containers/loki-server-*
        Tag               kube.*
        multiline.parser  docker, cri
        Mem_Buf_Limit     5MB

    [FILTER]
        Name                kubernetes
        Match               kube.*
        Kube_Tag_Prefix     kube.var.log.containers.
        Merge_Log           On
        Keep_Log            Off
        Labels              On
        Annotations         Off

    [INPUT]
        Name            systemd
        Tag             kernel.*
        Systemd_Filter  _TRANSPORT=kernel
        Read_From_Tail  On

    [INPUT]
        Name            systemd
        Tag             kubelet.*
        Systemd_Filter  _SYSTEMD_UNIT=kubelet.service
        Read_From_Tail  On

    [INPUT]
        Name            systemd
        Tag             containerd.*
        Systemd_Filter  _SYSTEMD_UNIT=containerd.service
        Read_From_Tail  On

    [OUTPUT]
        Name          loki
        Match         kube.*
        Host          loki-server.storage
        Port          3100
        Labels        job=kubernetes,namespace=$kubernetes['namespace_name'],pod=$kubernetes['pod_name'],container=$kubernetes['container_name'],app=$kubernetes['labels']['app']

    [OUTPUT]
        Name          loki
        Match         kubelet.*
        Host          loki-server.storage
        Port          3100
        Labels        job=kubelet

    [OUTPUT]
        Name          loki
        Match         containerd.*
        Host          loki-server.storage
        Port          3100
        Labels        job=containerd

    [OUTPUT]
        Name          loki
        Match         kernel.*
        Host          loki-server.storage
        Port          3100
        Labels        job=kernel
