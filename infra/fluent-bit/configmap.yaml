apiVersion: v1
kind: ConfigMap
metadata:
  name: config
data:
  fluent-bit.conf: |
    [SERVICE]
        Flush         5
        Daemon        Off
        Log_Level     warn
        Parsers_File  parsers.conf
        HTTP_Server   On
        HTTP_Listen   0.0.0.0
        HTTP_Port     2020
        Health_Check  On
 
    # Kubernetes pod logs
    [INPUT]
        Name              tail
        Tag               kube.*
        Path              /var/log/containers/*.log
        Exclude_Path      /var/log/containers/fluent-bit-*,/var/log/containers/logd-server-*
        multiline.parser  docker, cri
        DB                /var/log/flb_kube.db
        Mem_Buf_Limit     10MB
        Skip_Long_Lines   On
        Refresh_Interval  10

    [INPUT]
        Name            systemd
        Tag             systemd.kubelet
        Systemd_Filter  _SYSTEMD_UNIT=kubelet.service
        DB              /var/log/flb_kubelet.db
        Read_From_Tail  On

    [INPUT]
        Name            systemd
        Tag             systemd.containerd
        Systemd_Filter  _SYSTEMD_UNIT=containerd.service
        DB              /var/log/flb_containerd.db
        Read_From_Tail  On
 
    # dmesg — kernel ring buffer via journald transport
    [INPUT]
        Name            systemd
        Tag             dmesg.*
        Systemd_Filter  _TRANSPORT=kernel
        DB              /var/log/flb_dmesg.db
        Read_From_Tail  On
 
    # Enrich pod logs with Kubernetes metadata (namespace, pod, image, labels…)
    [FILTER]
        Name                kubernetes
        Match               kube.*
        Kube_URL            https://kubernetes.default.svc:443
        Kube_CA_File        /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
        Kube_Token_File     /var/run/secrets/kubernetes.io/serviceaccount/token
        Kube_Tag_Prefix     kube.var.log.containers.
        Merge_Log           On
        Keep_Log            Off
        Annotations         Off
        Labels              On
 
    [FILTER]
        Name    nest
        Match   kube.*
        Operation lift
        Nested_under kubernetes
        Add_prefix kube_

    # Wrap everything into "data"
    [FILTER]
        Name       nest
        Match      *
        Operation  nest
        Wildcard   *
        Nest_under data

    [FILTER]
        Name    record_modifier
        Match   systemd.kubelet
        Record  source kubelet

    [FILTER]
        Name    record_modifier
        Match   systemd.containerd
        Record  source containerd

    [FILTER]
        Name    record_modifier
        Match   dmesg.*
        Record  source dmesg

    [FILTER]
        Name    lua
        Match   kube.*
        script  event.lua
        call    set_source
 
    [OUTPUT]
        Name              http
        Match             *
        Host              logd.storage
        Port              8145
        URI               /logs
        Format            json
        json_date_key     timestamp
        json_date_format  iso8601
        Retry_Limit       5
 
  parsers.conf: |
    # Standard Docker / CRI parsers are built-in; define extras here if needed.
    [PARSER]
        Name        json
        Format      json
        Time_Key    time
        Time_Format %Y-%m-%dT%H:%M:%S.%LZ

  event.lua: |
    function set_source(tag, timestamp, record)
        local app = ""
        if record["data"] and record["data"]["kube_labels"] and record["data"]["kube_labels"]["app"] then
            app = record["data"]["kube_labels"]["app"]
        else
            app = "unknown"
        end
        record["source"] = "app:" .. app

        record["timestamp"] = record["data"]["timestamp"]
        record["data"]["timestamp"] = nil

        return 1, timestamp, record
    end
