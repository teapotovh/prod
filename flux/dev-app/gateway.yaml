apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: dev-app-gateway
spec:
  interval: 1h
  path: dev-app/gateway
  prune: true
  dependsOn:
    - name: dev-app
    - name: app-gateway
    - name: gateway-api
    - name: envoy-gateway-crd
  sourceRef:
    kind: GitRepository
    name: prod
