apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: cloudnative-pg-crd
spec:
  interval: 5m
  path: infra/cloudnative-pg/crd
  prune: true
  sourceRef:
    kind: GitRepository
    name: prod
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: cloudnative-pg
spec:
  interval: 5m
  path: infra/cloudnative-pg
  prune: true
  dependsOn:
    - name: cloudnative-pg-crd
    - name: local-path-provisioner
  sourceRef:
    kind: GitRepository
    name: prod
