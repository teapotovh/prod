apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: envoy-gateway
spec:
  interval: 5m
  path: infra/envoy-gateway
  prune: true
  dependsOn:
    - name: gateway-api
  sourceRef:
    kind: GitRepository
    name: prod
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: envoy-gateway-cert
spec:
  interval: 5m
  path: infra/envoy-gateway/cert
  prune: true
  dependsOn:
    - name: envoy-gateway
  sourceRef:
    kind: GitRepository
    name: prod

