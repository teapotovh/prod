apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: dex-storage
spec:
  interval: 5m
  path: app/dex/storage
  prune: true
  dependsOn:
    - name: postgresql01
  sourceRef:
    kind: GitRepository
    name: prod
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: dex
spec:
  interval: 5m
  path: app/dex
  prune: true
  dependsOn:
    - name: app
    - name: dex-storage
    - name: bottin
  sourceRef:
    kind: GitRepository
    name: prod
