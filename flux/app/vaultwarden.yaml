apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: vaultwarden-storage
spec:
  interval: 5m
  path: app/vaultwarden/storage
  prune: true
  dependsOn:
    - name: postgresql01
  sourceRef:
    kind: GitRepository
    name: prod
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: vaultwarden
spec:
  interval: 5m
  path: app/vaultwarden
  prune: true
  dependsOn:
    - name: app
    - name: vaultwarden-storage
    - name: bottin
  sourceRef:
    kind: GitRepository
    name: prod
