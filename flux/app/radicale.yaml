apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: radicale-storage
spec:
  interval: 5m
  path: app/radicale/storage
  prune: true
  dependsOn:
    - name: postgresql01
  sourceRef:
    kind: GitRepository
    name: prod
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: radicale
spec:
  interval: 5m
  path: app/radicale
  prune: true
  dependsOn:
    - name: app
    - name: radicale-storage
    - name: bottin
  sourceRef:
    kind: GitRepository
    name: prod
