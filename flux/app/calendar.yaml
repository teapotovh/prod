apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: calendar-storage
spec:
  interval: 1h
  path: app/calendar/storage
  prune: true
  dependsOn:
    - name: postgresql01
  sourceRef:
    kind: GitRepository
    name: prod
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: calendar
spec:
  interval: 1h
  path: app/calendar
  prune: true
  dependsOn:
    - name: app
    - name: calendar-storage
    - name: bottin
    - name: garage01
  sourceRef:
    kind: GitRepository
    name: prod
