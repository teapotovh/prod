apiVersion: v1
kind: ConfigMap
metadata:
  name: config
data:
  tempo.yaml: |
    server:
      http_listen_port: 3200

    distributor:
      receivers:
        otlp:
          protocols:
            grpc:
              endpoint: 0.0.0.0:4317

    live_store:
      max_block_bytes: 1_000_000
      max_block_duration: 5m

    overrides:
      defaults:
        compaction:
          block_retention: 72h

    storage:
      trace:
        backend: local
        local:
          path: /var/tempo/traces
        wal:
          path: /var/tempo/wal
