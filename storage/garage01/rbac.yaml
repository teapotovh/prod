apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: manage-crds
rules:
- apiGroups: ["deuxfleurs.fr"]
  resources: ["garagenodes"]
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: allow-crds
subjects:
- kind: ServiceAccount
  name: serviceaccount
roleRef:
  kind: ClusterRole
  name: manage-crds
  apiGroup: rbac.authorization.k8s.io
