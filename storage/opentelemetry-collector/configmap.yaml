apiVersion: v1
kind: ConfigMap
metadata:
  name: config
data:
  collector.yaml: |
    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: 0.0.0.0:4317

    processors:
      batch: {}
      memory_limiter:
        check_interval: 5s
        limit_mib: 50

    exporters:
      otlp:
        endpoint: tempo-server
        tls:
          insecure: true

    service:
      pipelines:
        traces:
          receivers: [otlp]
          processors: [memory_limiter, batch]
          exporters: [otlp]
