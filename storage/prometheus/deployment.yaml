apiVersion: apps/v1
kind: Deployment
metadata:
  name: server
  annotations:
    reloader.stakater.com/auto: "true"
spec:
  replicas: 1
  template:
    metadata:
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9090"
    spec:
      # tolerations:
      # - key: node-role.kubernetes.io/control-plane
      #   operator: Exists
      #   effect: NoSchedule
      # nodeSelector:
      #   node-role.kubernetes.io/control-plane: ""
      containers:
        - name: prometheus
          image: mirror.gcr.io/prom/prometheus:v3.12.0-distroless
          imagePullPolicy: IfNotPresent
          args:
            - "--storage.tsdb.retention.time=7d"
            - "--config.file=/etc/prometheus/prometheus.yml"
            - "--storage.tsdb.path=/data/"
            - '--web.enable-lifecycle'
          ports:
            - name: http
              containerPort: 9090
          volumeMounts:
            - name: config
              mountPath: /etc/prometheus/
            - name: data
              mountPath: /data/
          resources:
            requests:
              memory: 256Mi
              cpu: 300m
            limits:
              memory: 512Mi
              cpu: 500m
      volumes:
        - name: config
          configMap:
            defaultMode: 420
            name: config
        - name: data
          persistentVolumeClaim:
            claimName: store
      serviceAccountName: serviceaccount
