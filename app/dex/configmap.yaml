apiVersion: v1
kind: ConfigMap
metadata:
  name: config
data:
  "config.yaml": |
    # The base path of Dex and the external name of the OpenID Connect service.
    # This is the canonical URL that all clients MUST use to refer to Dex. If a
    # path is provided, Dex's HTTP service will listen at a non-root URL.
    issuer: https://oauth.teapot.ovh

    # The storage configuration determines where Dex stores its state.
    # Supported options include:
    #   - SQL flavors
    #   - key-value stores (eg. etcd)
    #   - Kubernetes Custom Resources
    #
    # See the documentation (https://dexidp.io/docs/storage/) for further information.
    storage:
      #type: memory

      # type: sqlite3
      # config:
      #   file: /var/dex/dex.db

      # type: mysql
      # config:
      #   host: 127.0.0.1
      #   port: 3306
      #   database: dex
      #   user: mysql
      #   password: mysql
      #   ssl:
      #     mode: "false"

      type: postgres
      config:
        host: postgresql01-pooler.storage
        port: 5432
        database: dex
        user: "{{ .Env.DB_USERNAME }}"
        password: "{{ .Env.DB_PASSWORD }}"
        ssl:
          mode: disable

      # type: etcd
      # config:
      #   endpoints:
      #     - http://127.0.0.1:2379
      #   namespace: dex/

      # type: kubernetes
      # config:
      #   kubeConfigFile: $HOME/.kube/config

    # HTTP service configuration
    web:
      http: 0.0.0.0:8080

      # Uncomment to enable HTTPS endpoint.
      # https: 127.0.0.1:5554
      # tlsCert: /etc/dex/tls.crt
      # tlsKey: /etc/dex/tls.key
      # tlsMinVersion: 1.2
      # tlsMaxVersion: 1.3

    # Dex UI configuration
    frontend:
      issuer: dex
      logoURL: theme/logo.png
      dir: ""
      theme: dark

    # Telemetry configuration
    # telemetry:
    #   http: 127.0.0.1:5558

    # logger:
    #   level: "debug"
    #   format: "text" # can also be "json"

    # gRPC API configuration
    # Uncomment this block to enable the gRPC API.
    # See the documentation (https://dexidp.io/docs/api/) for further information.
    # grpc:
    #   addr: 127.0.0.1:5557
    #   tlsCert: examples/grpc-client/server.crt
    #   tlsKey: examples/grpc-client/server.key
    #   tlsClientCA: examples/grpc-client/ca.crt

    # Expiration configuration for tokens, signing keys, etc.
    # expiry:
    #   deviceRequests: "5m"
    #   signingKeys: "6h"
    #   idTokens: "24h"
    #   refreshTokens:
    #     disableRotation: false
    #     reuseInterval: "3s"
    #     validIfNotUsedFor: "2160h" # 90 days
    #     absoluteLifetime: "3960h" # 165 days

    # OAuth2 configuration
    oauth2:
    #   # use ["code", "token", "id_token"] to enable implicit flow for web-only clients
      responseTypes: [ "code" ] # also allowed are "token" and "id_token"
    #
    #   # By default, Dex will ask for approval to share data with application
    #   # (approval for sharing data from connected IdP to Dex is separate process on IdP)
      skipApprovalScreen: true
    #
    #   # If only one authentication method is enabled, the default behavior is to
    #   # go directly to it. For connected IdPs, this redirects the browser away
    #   # from application to upstream provider such as the Google login page
    #   alwaysShowLoginScreen: false
    #
    #   # Uncomment to use a specific connector for password grants
    #   passwordConnector: local

    # Static clients registered in Dex by default.
    #
    # Alternatively, clients may be added through the gRPC API.
    staticClients:
      - id: immich
        redirectURIs:
          - 'app.immich:///oauth-callback'
          - 'https://photos.teapot.ovh/auth/login'
          - 'https://photos.teapot.ovh/user-settings'
        name: 'Immich app'
        secret: "{{ .Env.IMMICH_SECRET }}"

    # Connectors are used to authenticate users against upstream identity providers.
    #
    # See the documentation (https://dexidp.io/docs/connectors/) for further information.
    connectors:
    - type: ldap
      # Required field for connector id.
      id: ldap
      # Required field for connector name.
      name: LDAP
      config:
        # Host and optional port of the LDAP server in the form "host:port".
        # If the port is not supplied, it will be guessed based on "insecureNoSSL",
        # and "startTLS" flags. 389 for insecure or StartTLS connections, 636
        # otherwise.
        host: bottin-server.storage:389

        # Following field is required if the LDAP host is not using TLS (port 389).
        # Because this option inherently leaks passwords to anyone on the same network
        # as dex, THIS OPTION MAY BE REMOVED WITHOUT WARNING IN A FUTURE RELEASE.
        #
        insecureNoSSL: true

        # If a custom certificate isn't provide, this option can be used to turn on
        # TLS certificate checks. As noted, it is insecure and shouldn't be used outside
        # of explorative phases.
        #
        # insecureSkipVerify: true

        # When connecting to the server, connect using the ldap:// protocol then issue
        # a StartTLS command. If unspecified, connections will use the ldaps:// protocol
        #
        startTLS: false

        # Path to a trusted root certificate file. Default: use the host's root CA.
        # rootCA: /etc/dex/ldap.ca

        # A raw certificate file can also be provided inline.
        # rootCAData: ( base64 encoded PEM file )

        # The DN and password for an application service account. The connector uses
        # these credentials to search for users and groups. Not required if the LDAP
        # server provides access for anonymous auth.
        # Please note that if the bind password contains a `$`, it has to be saved in an
        # environment variable which should be given as the value to `bindPW`.
        bindDN: "{{ .Env.LDAP_BIND_DN }}"
        bindPW: "{{ .Env.LDAP_BIND_PASSWORD }}"

        # The attribute to display in the provided password prompt. If unset, will
        # display "Username"
        usernamePrompt: Username

        # User search maps a username and password entered by a user to a LDAP entry.
        userSearch:
          # BaseDN to start the search from. It will translate to the query
          # "(&(objectClass=person)(uid=<username>))".
          baseDN: dc=teapot,dc=ovh
          # Optional filter to apply when searching the directory.
          filter: "(objectClass=posixAccount)"

          # username attribute used for comparing user entries. This will be translated
          # and combined with the other filter as "(<attr>=<username>)".
          username: cn
          # The following three fields are direct mappings of attributes on the user entry.
          # String representation of the user.
          idAttr: uid
          # Required. Attribute to map to Email.
          emailAttr: mail
          # Maps to display name of users. No default value.
          nameAttr: name
          # Maps to preferred username of users. No default value.
          preferredUsernameAttr: cn

        # Group search queries for groups given a user entry.
        groupSearch:
          # BaseDN to start the search from. It will translate to the query
          # "(&(objectClass=group)(member=<user uid>))".
          baseDN: cn=groups,dc=freeipa,dc=example,dc=com
          # Optional filter to apply when searching the directory.
          filter: "(objectClass=group)"

          # Following list contains field pairs that are used to match a user to a group. It adds an additional
          # requirement to the filter that an attribute in the group must match the user's
          # attribute value.
          userMatchers:
          - userAttr: uid
            groupAttr: member

          # Represents group name.
          nameAttr: name

    # Enable the password database.
    #
    # It's a "virtual" connector (identity provider) that stores
    # login credentials in Dex's store.
    # enablePasswordDB: true

    # If this option isn't chosen users may be added through the gRPC API.
    # A static list of passwords for the password connector.
    #
    # Alternatively, passwords my be added/updated through the gRPC API.
    # staticPasswords: []
