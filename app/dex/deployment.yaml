apiVersion: apps/v1
kind: Deployment
metadata:
  name: server
spec:
  replicas: 3
  template:
    spec:
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchLabels: {}
              topologyKey: kubernetes.io/hostname
      containers:
        - name: dex
          image: ghcr.io/dexidp/dex:latest
          imagePullPolicy: Always # Not the best thing to run in production
          ports:
            - name: http
              containerPort: 8080
          volumeMounts:
            - name: config
              mountPath: /etc/dex/config.docker.yaml
              subPath: config.yaml
              readOnly: true
          env:
            - name: DB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: postgresql01-user-dex
                  key: username
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgresql01-user-dex
                  key: password
            - name: LDAP_BIND_DN
              valueFrom:
                secretKeyRef:
                  name: bottin-admin
                  key: username
            - name: LDAP_BIND_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: bottin-admin
                  key: password
            - name: IMMICH_SECRET
              valueFrom:
                secretKeyRef:
                  name: dex-secrets
                  key: immich
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 15
      volumes:
        - name: config
          configMap:
            name: config
            items:
              - key: config.yaml
                path: config.yaml
