apiVersion: apps/v1
kind: Deployment
metadata:
  name: server
spec:
  replicas: 3
  template:
    spec:
      containers:
        - name: dex
          image: ghcr.io/dexidp/dex:latest
          imagePullPolicy: Always # Not the best thing to run in production
          ports:
            - containerPort: 389
          volumeMounts:
            - name: config
              mountPath: /etc/dex/config.docker.yaml
              subPath: config.yaml
              readOnly: true
          env:
            - name: DB_USERNAME
              valueFrom:
                secretKeyRef:
                  namespace: storage
                  name: postgresql01-user-dex
                  key: username
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  namespace: storage
                  name: postgresql01-user-dex
                  key: password
          livenessProbe:
            httpGet:
              path: /healthz
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 15
      volumes:
        - name: config
          configMap:
            name: config
            items:
              - key: config.yaml
                path: config.yaml
