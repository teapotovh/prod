apiVersion: apps/v1
kind: Deployment
metadata:
  name: server
  annotations:
    reloader.stakater.com/auto: "true"
spec:
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 0
      maxUnavailable: 1
  replicas: 3
  template:
    metadata:
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8146"
    spec:
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchLabels: {}
              topologyKey: kubernetes.io/hostname
      containers:
        - name: kontakte
          image: ghcr.io/teapotovh/kontakted:v0.0.14
          args:
            - --log-format=json
            - --ldap-url=ldap://bottin-server.storage:389
            - --ldap-root-dn=$(LDAP_BIND_DN)
            - --ldap-root-passwd=$(LDAP_BIND_PASSWORD)
            - --httpauth-jwt-secret=$(JWT_SECRET)
          env:
            - name: LDAP_BIND_DN
              valueFrom:
                secretKeyRef:
                  name: bottin-admin
                  key: username
            - name: LDAP_BIND_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: bottin-admin
                  key: password
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: kontakte-secrets
                  key: jwt
          ports:
            - name: http
              containerPort: 8145
            - name: observability
              containerPort: 8146
          livenessProbe:
            failureThreshold: 2
            httpGet:
              path: /livez
              port: observability
            initialDelaySeconds: 10
            periodSeconds: 30
            successThreshold: 1
            timeoutSeconds: 5
          startupProbe:
            failureThreshold: 6
            httpGet:
              path: /readyz
              port: observability
            initialDelaySeconds: 5
            periodSeconds: 10
            successThreshold: 1
            timeoutSeconds: 5
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 100m
              memory: 256Mi
