apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: gateway
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  gatewayClassName: envoy-gateway
  infrastructure:
    parametersRef:
      group: gateway.envoyproxy.io
      kind: EnvoyProxy
      name: app-proxy
  listeners:
    - name: http
      protocol: HTTP
      port: 80

    - name: user-teapot-ovh
      protocol: HTTPS
      port: 443
      hostname: user.teapot.ovh
      tls:
        mode: Terminate
        certificateRefs:
          - name: user-teapot-ovh-tls

    - name: oauth-teapot-ovh
      protocol: HTTPS
      port: 443
      hostname: oauth.teapot.ovh
      tls:
        mode: Terminate
        certificateRefs:
          - name: oauth-teapot-ovh-tls
