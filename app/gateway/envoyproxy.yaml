apiVersion: gateway.envoyproxy.io/v1alpha1
kind: EnvoyProxy
metadata:
  name: app-proxy
spec:
  provider:
    type: Kubernetes
    kubernetes:
      envoyDaemonSet:
        container:
          image: mirror.gcr.io/envoyproxy/envoy:distroless-v1.38.0
      envoyService:
        type: NodePort
        externalTrafficPolicy: Local
        patch:
          type: StrategicMerge
          value:
            spec:
              internalTrafficPolicy: Local
              ports:
              - nodePort: 30081
                port: 80
                protocol: TCP
              - nodePort: 30444
                port: 443
                protocol: TCP
