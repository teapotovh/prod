apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: httproute
spec:
  parentRefs:
    - name: gateway
  hostnames:
    - calendar2.teapot.ovh
  rules:
    - backendRefs:
      - group: ""
        kind: Service
        name: calendar-server
        port: 8080
        weight: 1
      matches:
      - path:
          type: PathPrefix
          value: /
